services:
  - type: web
    name: ccm-fleet-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 60
    envVars:
      - key: DROPBOX_TOKEN
        sync: false
      - key: DROPBOX_JSON
        value: /ccm_data.json
      - key: REFRESH_MINUTES
        value: 30
